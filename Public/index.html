<h2>My Website</h2>

<!-- Banner Ad -->
<h3>Banner Ad</h3>
<div style="width:300px;height:250px;">
<script>
var __jscp=function(){
    for(var b=0,a=window;a!=a.parent;)++b,a=a.parent;
    if(a=window.parent==window?document.URL:document.referrer){
        var c=a.indexOf("://");
        if(c>=0)a=a.substring(c+3);
        c=a.indexOf("/");
        if(c>=0)a=a.substring(0,c);
    }
    var obj={
        pu:a,
        "if":b,
        rn:Math.floor(99999999*Math.random())+1
    };
    var arr=[];
    for(var k in obj){
        arr.push(k+"="+encodeURIComponent(obj[k]));
    }

    document.write('<script src="https://cpm.ezmob.com/tag?zone_id=385133&size=300x250&subid=&j='+
    encodeURIComponent(arr.join("&"))+
    '"><\/script>');
};
__jscp();
</script>
</div>

<hr>

<h3>Video Ad</h3>

<button onclick="showVideoAd()">Show Video Ad</button>

<div id="container-1"></div>

<script>
var pbjs = pbjs || {};
pbjs.que = pbjs.que || [];

function showVideoAd(){

    pbjs.que.push(function(){

        var adUnits=[{
            code:"container-1",
            mediaTypes:{
                video:{
                    context:"outstream",
                    playerSize:[300,250],
                    renderer:{
                        url:"https://docdn.ezmob.com/outstream_pb.js",
                        render:renderOutstream
                    }
                }
            },
            bids:[{
                bidder:"adkernel",
                params:{
                    zoneId:385132,
                    host:"cpm.ezmob.com"
                }
            }]
        }];

        pbjs.addAdUnits(adUnits);

        pbjs.requestBids({
            bidsBackHandler:function(){
                var bids=pbjs.getHighestCpmBids("container-1");
                if(bids.length){
                    pbjs.renderAd(document,bids[0].adId);
                }else{
                    alert("No Video Ad Available");
                }
            }
        });

    });

}

function renderOutstream(bid){
    OutstreamPlayerPB(bid,{
        displayMode:"floating",
        transitions:true,
        vpaidMode:2
    });
}
</script>
